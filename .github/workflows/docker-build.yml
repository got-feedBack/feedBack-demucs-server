# ============================================================
# Docker Build, SBOM & Security Scan — Slopsmith Demucs Server
# ============================================================
# Builds Docker image, generates SBOM, scans for vulnerabilities:
#   - On every push to main branch
#   - On demand via workflow_dispatch
# ============================================================

name: Docker Build + Security Scan

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required for GHCR push
permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_TAG: ghcr.io/${{ github.repository }}:${{ github.sha }}

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_TAG }}
            ghcr.io/${{ github.repository }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── SBOM Generation ──────────────────────────────────────────────────
      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_TAG }}
          format: cyclonedx-json
          output-file: sbom/sbom-docker-cyclonedx.json

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_TAG }}
          format: spdx-json
          output-file: sbom/sbom-docker-spdx.json

      # ── Vulnerability Scanning ──────────────────────────────────────────
      - name: Scan Docker image with Grype
        uses: anchore/scan-action@v5
        id: scan
        with:
          image: ${{ env.IMAGE_TAG }}
          fail-build: false
          severity-cutoff: medium
          output-format: sarif

      - name: Upload SARIF report to GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: success() || failure()
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
          category: grype

      - name: Generate human-readable scan report
        if: success() || failure()
        run: |
          grype ${{ env.IMAGE_TAG }} --scope all-layers -o table > sbom/vulnerability-report.txt
          echo "=== Vulnerability Report ==="
          cat sbom/vulnerability-report.txt

      # ── Upload artifacts ────────────────────────────────────────────────
      - name: Upload SBOM and scan results
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: sbom-and-scan-results
          path: sbom/
          retention-days: 30

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,format=short
