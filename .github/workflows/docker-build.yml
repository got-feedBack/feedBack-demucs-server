# ============================================================
# Docker Build, SBOM & Security Scan — Slopsmith Demucs Server
# ============================================================
# Builds Docker image, generates SBOM, scans for vulnerabilities:
#   - On every push to main branch
#   - On demand via workflow_dispatch
# ============================================================

name: Docker Build + Security Scan

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required for GHCR push
permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      # GHCR requires lowercase repository names
      - name: Lowercase repo for GHCR tag
        id: tag
        run: |
          REPO_LC="${REPO_OWNER,,}/${REPO_NAME,,}"
          echo "image=ghcr.io/${REPO_LC}" >> "$GITHUB_OUTPUT"
          echo "tag=ghcr.io/${REPO_LC}:${SHA}" >> "$GITHUB_OUTPUT"
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          SHA: ${{ github.sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          push: true
          tags: |
            ${{ steps.tag.outputs.tag }}
            ${{ github.ref == 'refs/heads/main' && format('{0}:latest', steps.tag.outputs.image) || '' }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Create output directory for SBOM + scan results ──
      - name: Create output directory
        run: mkdir -p sbom/

      # ── SBOM Generation ──────────────────────────────────────────────────
      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: ${{ steps.tag.outputs.tag }}
          format: cyclonedx-json
          output-file: sbom/sbom-docker-cyclonedx.json

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: ${{ steps.tag.outputs.tag }}
          format: spdx-json
          output-file: sbom/sbom-docker-spdx.json

      # ── Vulnerability Scanning ──────────────────────────────────────────
      - name: Scan Docker image with Grype
        id: scan
        uses: anchore/scan-action@869c549e657a088dc0441b08ce4fc0ecdac2bb65
        with:
          image: ${{ steps.tag.outputs.tag }}
          fail-build: false
          severity-cutoff: medium

      - name: Upload SARIF report to GitHub
        if: steps.scan.outputs.sarif != ''
        uses: github/codeql-action/upload-sarif@458d36d7d4f47d0dd16ca424c1d3cda0060f1360
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
          category: grype

      # ── Install Grype CLI for human-readable report ──────────────────
      - name: Install Grype CLI
        id: grype-cli
        uses: anchore/scan-action/download-grype@869c549e657a088dc0441b08ce4fc0ecdac2bb65

      - name: Generate human-readable scan report
        if: success() || failure()
        run: |
          ${{ steps.grype-cli.outputs.cmd }} ${{ steps.tag.outputs.tag }} --scope all-layers -o table > sbom/vulnerability-report.txt || true
          echo "=== Vulnerability Report ==="
          cat sbom/vulnerability-report.txt

      # ── Upload artifacts ────────────────────────────────────────────────
      - name: Upload SBOM and scan results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: success() || failure()
        with:
          name: sbom-and-scan-results
          path: sbom/
          retention-days: 30
