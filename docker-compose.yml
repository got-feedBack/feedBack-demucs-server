# ============================================================
# Slopsmith Demucs Server — Docker Compose
# ============================================================
# Usage:
#   docker compose up -d                    # CPU mode
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d   # GPU
#
# Default listens on port 7865.
# Auto-update checks for repo changes daily at 04:00.
# ============================================================

services:
  slopsmith-demucs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: slopsmith-demucs
    restart: unless-stopped
    ports:
      - "7865:7865"
    volumes:
      # Persist model weights between restarts (~1.5 GB after warmup)
      - demucs-cache:/app/cache
      # Mount .git so auto-update can pull changes
      - type: bind
        source: ./.git
        target: /app/.git
        read_only: false
    environment:
      - PORT=7865
      - HOST=0.0.0.0
      - AUTO_UPDATE=true
      - UPDATE_TIME=04:00
      - UPDATE_CHECK_INTERVAL=3600
      # - SLOPSMITH_DEMUCS_MODEL=htdemucs_ft
      # - SLOPSMITH_API_KEY=your-secret-key
      # - SKIP_WARMUP=false
    # GPU support requires nvidia-container-toolkit:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  demucs-cache:
