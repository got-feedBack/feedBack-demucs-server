# ============================================================
# feedBack Demucs Server — Docker Compose
# ============================================================
# Usage (CLI):
#   docker compose up -d                    # Pull from GHCR + run
#
# Deploy (Portainer):
#   Copy this file into Portainer Stacks → Add Stack → paste
#
# Build from git URL (no local clone):
#   docker compose build
#   docker compose up -d
#
# Default listens on port 7865.
# ============================================================

services:
  feedback-demucs:
    # ── Pre-built image from GHCR (CI builds on every push to main) ──
    image: ghcr.io/got-feedback/feedback-demucs-server:latest

    # ── OR build from git URL ──
    # build: https://github.com/got-feedBack/feedBack-demucs-server.git#main

    # ── OR build from local Dockerfile ──
    # build:
    #   context: .
    #   dockerfile: Dockerfile

    container_name: feedback-demucs-server
    restart: unless-stopped
    ports:
      - "7865:7865"
    volumes:
      # Persistent model cache (~1.5 GB after warmup).
      # Stores: demucs weights, whisperx ASR, CREPE, wav2vec2 aligners
      - demucs-cache:/app/cache

      # ⚠️ AUTO-UPDATE: To enable daily git pulls, uncomment the block
      # below AND set AUTO_UPDATE=true in environment. Requires .git
      # directory on the host. NOT compatible with Portainer.
      # ---
      # - type: bind
      #   source: /absolute/path/to/your/clone/.git
      #   target: /app/.git
      #   read_only: false

    environment:
      - PORT=7865
      - HOST=0.0.0.0
      # Auto-update: set to true only if .git bind mount is active
      - AUTO_UPDATE=false
      - UPDATE_TIME=04:00
      - UPDATE_CHECK_INTERVAL=3600
      # The model feedBack splits with. Warmup only prefetches the DEFAULT model,
      # so setting this is what makes the first split fast rather than a cold
      # multi-GB download at the worst possible moment.
      - SLOPSMITH_DEMUCS_MODEL=bs_roformer_sw
      - SKIP_WARMUP=false
      # Cache cleanup TTL: auto-delete stems older than this (1h, 12h, 24h, NEVER)
      - CACHE_TTL=24h
      # Cache directories — redirect all model downloads to the
      # persistent volume so they survive container restarts:
      - SLOPSMITH_DEMUCS_CACHE=/app/cache
      - TORCH_HOME=/app/cache/torch
      - HF_HOME=/app/cache/huggingface
      - HUGGINGFACE_HUB_CACHE=/app/cache/huggingface/hub
      # - SLOPSMITH_API_KEY=your-secret-key

      # ── GPU (see below) ──
      # - NVIDIA_VISIBLE_DEVICES=all
      # - NVIDIA_DRIVER_CAPABILITIES=all

    # ── GPU support ──
    # Uncomment the line below for GPU acceleration. Requirements:
    #   * an NVIDIA GPU + driver on the HOST
    #   * nvidia-container-toolkit installed on the host
    #   * Linux, or Windows via the WSL2 backend. NOT macOS — Docker there is a
    #     Linux VM with no GPU passthrough, so a Mac is always CPU.
    # No CUDA toolkit is needed inside the image: the torch wheel bundles the
    # runtime. Verify it took with `curl localhost:7865/health` — it reports
    # `gpu` and `device`.
    #
    # (`gpus:` is the modern spelling. The old `runtime: nvidia` still works on
    # some setups but is deprecated.)
    # gpus: all

volumes:
  demucs-cache:
